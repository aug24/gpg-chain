AWSTemplateFormatVersion: "2010-09-09"
Description: >
  GPG Chain demo node — Python reference implementation, S3 block store, HTTPS via Caddy.
  Deploy dns.yaml first, then this stack. Delete this stack when not in use;
  the DNS record and S3 data persist. Redeploy to bring it back up.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------

Parameters:


  DomainName:
    Type: String
    Description: >
      Fully-qualified domain name for this node (e.g. demo.gpgchain.co.uk).
      Must match the DomainName used in the DNS stack.

  LetsEncryptEmail:
    Type: String
    Default: ""
    Description: Email for Let's Encrypt certificate notifications (optional but recommended).

  VpcId:
    Type: String
    Description: VPC to deploy into (looked up automatically by deploy-node.sh).

  SubnetId:
    Type: String
    Description: Public subnet (looked up automatically by deploy-node.sh).

  AmiId:
    Type: String
    Description: Amazon Linux 2023 AMI ID (looked up automatically by deploy-node.sh).

  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues: [t3.small, t3.medium, t3.large]
    Description: EC2 instance type. t3.small is sufficient for a demo node.

  AllowedDomains:
    Type: String
    Default: ""
    Description: >
      Comma-separated email domains this node accepts (e.g. "example.com").
      Leave empty and set AllowAllDomains=true to accept any domain.

  AllowAllDomains:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: Accept keys from any email domain. Required if AllowedDomains is empty.

  BootstrapPeers:
    Type: String
    Default: ""
    Description: Comma-separated peer node URLs to connect to at startup.

  S3BucketName:
    Type: String
    Default: ""
    Description: >
      S3 bucket for the block store. Leave empty to create one automatically
      named {StackName}-gpgchain-data. The bucket is retained when this stack
      is deleted so data persists between deployments.

  RepoUrl:
    Type: String
    Default: "https://github.com/aug24/gpg-chain"
    Description: Git URL of the gpg-chain repository.

# ---------------------------------------------------------------------------
# Metadata
# ---------------------------------------------------------------------------

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label: { default: "DNS (deploy dns.yaml first)" }
        Parameters: [DomainName, LetsEncryptEmail]
      - Label: { default: "Instance" }
        Parameters: [InstanceType, VpcId, SubnetId]
      - Label: { default: "Node configuration" }
        Parameters: [AllowedDomains, AllowAllDomains, BootstrapPeers]
      - Label: { default: "Data" }
        Parameters: [S3BucketName]
      - Label: { default: "Source" }
        Parameters: [RepoUrl]

# ---------------------------------------------------------------------------
# Conditions
# ---------------------------------------------------------------------------

Conditions:
  CreateS3Bucket: !Equals [!Ref S3BucketName, ""]

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------

Resources:

  # --------------------------------------------------------------------------
  # IAM
  # --------------------------------------------------------------------------

  NodeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-node-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ec2.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: S3BlockStore
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:DeleteObject, s3:ListBucket]
                Resource:
                  - !Sub
                    - "arn:aws:s3:::${Bucket}"
                    - Bucket: !If [CreateS3Bucket, !Sub "${AWS::StackName}-gpgchain-data", !Ref S3BucketName]
                  - !Sub
                    - "arn:aws:s3:::${Bucket}/*"
                    - Bucket: !If [CreateS3Bucket, !Sub "${AWS::StackName}-gpgchain-data", !Ref S3BucketName]

  NodeInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${AWS::StackName}-node-profile"
      Roles: [!Ref NodeRole]

  # --------------------------------------------------------------------------
  # S3 block store
  # --------------------------------------------------------------------------

  DataBucket:
    Type: AWS::S3::Bucket
    Condition: CreateS3Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "${AWS::StackName}-gpgchain-data"
      VersioningConfiguration: { Status: Enabled }
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 }
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # --------------------------------------------------------------------------
  # Networking
  # --------------------------------------------------------------------------

  NodeSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "GPG Chain - ${AWS::StackName}"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - { IpProtocol: tcp, FromPort: 80,  ToPort: 80,  CidrIp: "0.0.0.0/0", Description: "HTTP (ACME challenge)" }
        - { IpProtocol: tcp, FromPort: 443, ToPort: 443, CidrIp: "0.0.0.0/0", Description: "HTTPS" }
      SecurityGroupEgress:
        - { IpProtocol: -1, CidrIp: "0.0.0.0/0" }
      Tags:
        - { Key: Name, Value: !Sub "${AWS::StackName}-sg" }

  # --------------------------------------------------------------------------
  # EC2 instance
  # --------------------------------------------------------------------------

  NodeInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref AmiId
      IamInstanceProfile: !Ref NodeInstanceProfile
      SubnetId: !Ref SubnetId
      SecurityGroupIds: [!Ref NodeSecurityGroup]
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs: { VolumeSize: 20, VolumeType: gp3, DeleteOnTermination: true }
      Tags:
        - { Key: Name,   Value: !Sub "${AWS::StackName}-gpgchain" }
        - { Key: Domain, Value: !Ref DomainName }
      UserData:
        Fn::Base64: !Sub
          - |
            #!/bin/bash
            set -euo pipefail
            exec > >(tee /var/log/gpgchain-setup.log | logger -t gpgchain-setup 2>&1) 2>&1

            echo "=== GPG Chain setup: Python/S3 ==="

            # ---- System packages ----
            dnf update -y
            dnf install -y git python3.11 python3.11-pip fuse mount-s3

            # ---- gpg-chain Python package ----
            git clone "${RepoUrl}" /opt/gpg-chain
            pip3.11 install -e /opt/gpg-chain/implementations/python/

            # ---- Service user ----
            useradd -r -s /bin/false gpgchain 2>/dev/null || true
            GPGCHAIN_UID=$(id -u gpgchain)
            GPGCHAIN_GID=$(id -g gpgchain)

            # ---- Mount S3 bucket ----
            BUCKET="${BucketName}"
            mkdir -p /var/lib/gpgchain
            echo "user_allow_other" >> /etc/fuse.conf
            mount-s3 --allow-other --uid "$GPGCHAIN_UID" --gid "$GPGCHAIN_GID" "$BUCKET" /var/lib/gpgchain

            # ---- gpgchain node service ----
            EXTRA=""
            [ "${AllowAllDomains}" = "true" ] && EXTRA="$EXTRA --allow-all-domains"
            [ -n "${AllowedDomains}"  ] && EXTRA="$EXTRA --domains '${AllowedDomains}'"
            [ -n "${BootstrapPeers}" ] && EXTRA="$EXTRA --peers '${BootstrapPeers}'"

            cat > /etc/systemd/system/gpgchain.service << SVCEOF
            [Unit]
            Description=GPG Chain node
            After=network.target

            [Service]
            Type=simple
            User=gpgchain
            WorkingDirectory=/opt/gpg-chain/implementations/python
            ExecStart=/usr/bin/python3.11 node.py \
                --addr 127.0.0.1:8080 \
                --store-dir /var/lib/gpgchain \
                --node-url https://${DomainName} \
                $EXTRA
            Restart=on-failure
            RestartSec=5s

            [Install]
            WantedBy=multi-user.target
            SVCEOF

            systemctl daemon-reload
            systemctl enable --now gpgchain

            # ---- Caddy ----
            CADDY_VER=2.8.4
            mkdir -p /tmp/caddy-src
            curl -fsSL "https://github.com/caddyserver/caddy/releases/download/v$CADDY_VER/caddy_${!CADDY_VER}_linux_amd64.tar.gz" \
                -o /tmp/caddy.tar.gz
            tar -xzf /tmp/caddy.tar.gz -C /tmp/caddy-src
            install -m 755 /tmp/caddy-src/caddy /usr/local/bin/caddy
            rm -rf /tmp/caddy-src /tmp/caddy.tar.gz

            useradd --system --home /var/lib/caddy --shell /usr/sbin/nologin caddy 2>/dev/null || true
            mkdir -p /etc/caddy /var/lib/caddy /var/log/caddy
            chown caddy:caddy /var/lib/caddy /var/log/caddy

            EMAIL_LINE=""
            [ -n "${LetsEncryptEmail}" ] && EMAIL_LINE="    email ${LetsEncryptEmail}"

            cat > /etc/caddy/Caddyfile << CADDYEOF
            {
            $EMAIL_LINE
            }

            ${DomainName} {
                reverse_proxy 127.0.0.1:8080
                log {
                    output file /var/log/caddy/access.log
                    format json
                }
            }
            CADDYEOF

            cat > /etc/systemd/system/caddy.service << SVCEOF
            [Unit]
            Description=Caddy HTTPS reverse proxy
            After=network-online.target gpgchain.service
            Wants=network-online.target

            [Service]
            Type=notify
            User=caddy
            Group=caddy
            ExecStart=/usr/local/bin/caddy run --config /etc/caddy/Caddyfile
            ExecReload=/usr/local/bin/caddy reload --config /etc/caddy/Caddyfile --force
            TimeoutStopSec=5s
            LimitNOFILE=1048576
            AmbientCapabilities=CAP_NET_BIND_SERVICE
            Restart=on-failure
            RestartSec=10s

            [Install]
            WantedBy=multi-user.target
            SVCEOF

            systemctl daemon-reload
            systemctl enable --now caddy

            echo "=== Setup complete. Caddy will obtain TLS cert once DNS is live. ==="

          - BucketName: !If
              - CreateS3Bucket
              - !Sub "${AWS::StackName}-gpgchain-data"
              - !Ref S3BucketName

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------

Outputs:

  NodeEndpoint:
    Description: GPG Chain HTTPS endpoint (live once DNS propagates and cert is issued).
    Value: !Sub "https://${DomainName}"

  WellKnownUrl:
    Description: Node discovery endpoint.
    Value: !Sub "https://${DomainName}/.well-known/gpgchain.json"

  BucketName:
    Description: S3 bucket holding the block store (retained on stack delete).
    Value: !If
      - CreateS3Bucket
      - !Ref DataBucket
      - !Ref S3BucketName

  InstanceId:
    Description: EC2 instance ID.
    Value: !Ref NodeInstance

  SetupLog:
    Description: View setup progress via SSM Session Manager.
    Value: !Sub "aws ssm start-session --target ${NodeInstance} --document-name AWS-StartInteractiveCommand --parameters command='sudo tail -f /var/log/gpgchain-setup.log'"

  CaddyLog:
    Description: Watch Caddy (cert issuance progress) via SSM Session Manager.
    Value: !Sub "aws ssm start-session --target ${NodeInstance} --document-name AWS-StartInteractiveCommand --parameters command='sudo journalctl -u caddy -f'"

  QuickTest:
    Description: Smoke-test the node (run after DNS has propagated).
    Value: !Sub "curl https://${DomainName}/.well-known/gpgchain.json"
